
name: 📚 Validate Documentation

on:
  pull_request:
    paths:
      - 'documentation/**'
      - 'scripts/validation/**'
  push:
    branches: [main]
    paths:
      - 'documentation/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r scripts/requirements.txt

    - name: Run validation
      run: |
        python scripts/validation/run_all_checks.py \
          --docs-dir ./documentation \
          --output-dir ./reports \
          --fail-on-warning

    - name: Upload report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: validation-report
        path: reports/
        retention-days: 30

    - name: Comment on PR
      uses: actions/github-script@v7
      if: github.event_name == 'pull_request'
      with:
        script: |
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('./reports/validation_results.json', 'utf8'));
          
          const summary = report.summary;
          const comment = `
          ## 📋 Documentation Validation Results
          
          | Check | Status |
          |-------|--------|
          | Total | ${summary.total} |
          | ✅ Passed | ${summary.passed} |
          | ❌ Failed | ${summary.failed} |
          | ⚠️ Warnings | ${summary.warnings} |
          
          ${summary.failed > 0 ? '❌ **Validation FAILED** — Please fix issues before merge.' : '✅ **Validation PASSED**'}
          `;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });