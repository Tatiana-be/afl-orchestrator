
name: 📚 Validate Documentation

on:
  pull_request:
    paths:
      - 'documentation/**'
      - 'scripts/validation/**'
  push:
    branches: [main]
    paths:
      - 'documentation/**'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r scripts/requirements.txt

    - name: Run validation
      run: |
        python scripts/validation/run_all_checks.py \
          --docs-dir ./documentation \
          --output-dir ./reports \
          --fail-on-warning

    - name: Upload report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: validation-report
        path: reports/
        retention-days: 30

    - name: Comment on PR
      if: github.event_name == 'pull_request' && !cancelled()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');

          const reportPath = './reports/validation_results.json';

          if (!fs.existsSync(reportPath)) {
            console.log('No validation report found, skipping comment.');
            return;
          }

          const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
          const summary = report.summary;

          let validationResult = '✅ **Validation PASSED**';
          if (summary.failed > 0) {
            validationResult = '❌ **Validation FAILED** — Please fix issues before merge.';
          } else if (summary.warnings > 0) {
            validationResult = '⚠️ **Validation PASSED with warnings**';
          }

          const comment = [
            '## 📋 Documentation Validation Results',
            '',
            '| Check | Result |',
            '|-------|--------|',
            '| Total | ' + summary.total + ' |',
            '| ✅ Passed | ' + summary.passed + ' |',
            '| ❌ Failed | ' + summary.failed + ' |',
            '| ⚠️ Warnings | ' + summary.warnings + ' |',
            '',
            validationResult,
          ].join('\n');

          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });